<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Patient Care Study</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body class="page-centered">
  <div class="card card-done">
    <div class="done-icon">✓</div>
    <h1>Thank You!</h1>
    <p id="scoreText"></p>
    <p>Your responses will contribute to our research on automatic patient care monitoring.</p>
    <button class="btn-primary" id="downloadBtn" style="margin-top:1.5rem">
      Download My Results
    </button>
    <p class="muted" style="margin-top:0.75rem">You may now safely close this window.</p>
  </div>

  <script>
    const sess = JSON.parse(localStorage.getItem('patientStudySession') || 'null');

    if (sess && sess.answers && sess.answers.length > 0) {
      const correct = sess.answers.filter(a => a.correct).length;
      const total   = sess.answers.length;
      document.getElementById('scoreText').innerHTML =
        `You got <strong>${correct} out of ${total}</strong> correct.`;
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!sess) { alert('No session data found.'); return; }
      const blob = new Blob([JSON.stringify(sess, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `patient-study-${sess.id || 'results'}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
