<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Patient Care Study</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body class="page-centered">
  <div class="card card-done">
    <div class="done-icon">✓</div>
    <h1>Thank You!</h1>
    <p id="scoreText"></p>
    <p>Your responses will contribute to our research on automatic patient care monitoring.</p>
    <p class="muted" style="margin-top:0.75rem">You may now safely close this window.</p>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxVjhisvTJ0Hv1R_hMZJV0E9BDHjN3LBH1TVcgsOXJFDHArAubUjiKz4KlQ-QmNT-i/exec";

    const sess = JSON.parse(localStorage.getItem('patientStudySession') || 'null');

    if (sess && sess.answers && sess.answers.length > 0) {
      const correct = sess.answers.filter(a => a.correct).length;
      const total   = sess.answers.length;
      document.getElementById('scoreText').innerHTML =
        `You got <strong>${correct} out of ${total}</strong> correct.`;

      const elapsedMs = sess.answers.reduce((s, a) => s + (a.elapsed_ms || 0), 0);

      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          session_id: sess.id,
          correct:    correct,
          total:      total,
          elapsed_ms: elapsedMs,
          answers:    sess.answers
        })
      }).catch(() => {});  // silently ignore network errors
    }
  </script>
</body>
</html>
