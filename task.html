<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Care Study</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body class="task-page">

  <header class="task-header">
    <span class="progress-label" id="progressLabel">Video 1 of 4</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <span class="progress-pct" id="progressPct">0%</span>
  </header>

  <div class="task-layout">

    <section class="video-panel">
      <video id="player" controls autoplay loop playsinline></video>
      <p class="video-hint">Replay as needed, then select the action →</p>
    </section>

    <section class="buttons-panel">
      <h3 class="panel-title">What action is shown?</h3>
      <div class="class-buttons" id="btnList"></div>
    </section>

  </div>

  <script>
    // ── Read session from localStorage ──────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const idx     = parseInt(params.get('idx') || '0', 10);
    const sessRaw = localStorage.getItem('patientStudySession');

    if (!sessRaw) {
      window.location.href = 'index.html';
    } else {
      const sess  = JSON.parse(sessRaw);
      const total = sess.videos.length;

      if (idx >= total) {
        window.location.href = 'done.html';
      } else {
        init(sess, idx, total);
      }
    }

    // ── Initialise the task page ─────────────────────────────────────────────
    function init(sess, idx, total) {
      // Progress bar
      const pct = Math.round((idx / total) * 100);
      document.getElementById('progressLabel').textContent = `Video ${idx + 1} of ${total}`;
      document.getElementById('progressFill').style.width  = pct + '%';
      document.getElementById('progressPct').textContent   = pct + '%';
      document.title = `Video ${idx + 1} of ${total} — Patient Care Study`;

      // Video
      const video  = sess.videos[idx];
      const player = document.getElementById('player');
      player.src   = video.path;
      player.play().catch(() => {});

      // Class buttons
      const btnList  = document.getElementById('btnList');
      let   answered = false;
      const startMs  = Date.now();

      sess.classes.forEach((cls, i) => {
        const btn = document.createElement('button');
        btn.className        = 'class-btn';
        btn.dataset.classId  = cls.id;
        btn.innerHTML =
          `<span class="btn-num">${i + 1}</span>` +
          `<span class="btn-name">${escHtml(cls.name)}</span>`;

        btn.addEventListener('click', () => {
          if (answered) return;
          answered = true;

          // Disable all buttons, highlight chosen
          document.querySelectorAll('.class-btn').forEach(b => b.disabled = true);
          btn.classList.add('selected');

          // Save answer
          sess.answers.push({
            videoIndex:       idx,
            trueClassId:      video.class_id,
            trueClassName:    video.class_name,
            predictedClassId: cls.id,
            predictedClassName: cls.name,
            correct:          video.class_id === cls.id,
            elapsedMs:        Date.now() - startMs,
            answeredAt:       Date.now(),
          });

          const nextIdx = idx + 1;
          if (nextIdx >= total) {
            sess.completed   = true;
            sess.completedAt = Date.now();
          }

          localStorage.setItem('patientStudySession', JSON.stringify(sess));
          window.location.href = nextIdx >= total ? 'done.html' : `task.html?idx=${nextIdx}`;
        });

        btnList.appendChild(btn);
      });
    }

    // ── Send partial answers when user leaves the page ──────────────────────
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPo50mfYxWu-GIMmkkN-y6477JH7zetUqjW0msyJt4GpxEZdLKVD9CGvkmv3lbZq5T/exec";

    function sendPartialToServer() {
      try {
        const raw = localStorage.getItem('patientStudySession');
        if (!raw) return;
        const sess = JSON.parse(raw);
        if (!sess.answers || sess.answers.length === 0 || sess.completed) return;

        const payload = JSON.stringify({
          session_id: sess.id,
          partial:    true,
          correct:    sess.answers.filter(a => a.correct).length,
          total:      sess.answers.length,
          elapsed_ms: sess.answers.reduce((s, a) => s + (a.elapsedMs || 0), 0),
          answers:    sess.answers.map(a => ({
            videoIndex:         a.videoIndex,
            trueClassId:        a.trueClassId,
            trueClassName:      a.trueClassName,
            predictedClassId:   a.predictedClassId,
            predictedClassName: a.predictedClassName,
            correct:            a.correct,
            elapsedMs:          a.elapsedMs || 0,
          })),
        });

        // Use sendBeacon so the request survives page unload
        if (navigator.sendBeacon) {
          navigator.sendBeacon(APPS_SCRIPT_URL, new Blob([payload], { type: 'application/json' }));
        } else {
          fetch(APPS_SCRIPT_URL, { method: 'POST', body: payload, keepalive: true }).catch(() => {});
        }
      } catch (e) {}
    }

    // Fire when user hides / closes the tab
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') sendPartialToServer();
    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
